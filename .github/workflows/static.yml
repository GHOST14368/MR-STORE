data:text/html;charset=utf-8,
<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>MR STORE | خدمات تلگرام و دیجیتال</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{margin:0;background:#0f0f0f;color:#fff;font-family:Tahoma;direction:rtl;}
header{padding:15px 25px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #222;background:#0f0f0f;}
header h1{margin:0;font-size:22px;color:#00c8ff;}
nav a{color:#fff;margin-left:15px;text-decoration:none;font-size:14px;}
nav a:hover{color:#00c8ff;}
.banner{padding:80px 20px;text-align:center;background:#1a1a1a;}
.banner h2{font-size:32px;color:#00c8ff;}
.banner p{color:#ccc;font-size:15px;}
.container{max-width:1100px;margin:0 auto;padding:25px 15px 60px;}
.section-title{font-size:22px;margin-bottom:15px;border-right:4px solid #00c8ff;padding-right:10px;}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
@media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:600px){.grid{grid-template-columns:1fr;}}
.card{background:#1a1a1a;border-radius:10px;padding:15px;border:1px solid #222;}
.card h4{margin:0 0 10px;font-size:16px;color:#00c8ff;}
.card ul{list-style:none;padding:0;margin:0;font-size:13px;}
.card ul li{margin-bottom:6px;}
.price{color:#ffd700;font-weight:bold;}
.btn{display:inline-block;margin-top:10px;padding:8px 14px;border-radius:6px;background:#00c8ff;color:#000;font-size:13px;text-decoration:none;}
.btn:hover{background:#00a0cc;}
footer{border-top:1px solid #222;padding:15px 20px;font-size:12px;color:#777;text-align:center;background:#0f0f0f;}
</style>
</head>
<body>
<header>
<h1>MR STORE</h1>
<nav>
<a href="#">خانه</a>
<a href="#services">خدمات</a>
<a href="#about">درباره ما</a>
<a href="#contact">تماس</a>
</nav>
</header>
<section class="banner">
<h2>MR STORE</h2>
<p>فروشگاه تخصصی خدمات تلگرام، شماره مجازی و سرویس‌های دیجیتال با قیمت‌های ویژه ایران.</p>
</section>
<div class="container">
<section id="services">
<h3 class="section-title">خدمات تلگرام و دیجیتال</h3>
<div class="grid">
<div class="card">
<h4>شماره مجازی</h4>
<ul>
<li>آمریکا – <span class="price">۷۰,۰۰۰ تومان</span></li>
<li>روسیه – <span class="price">۴۵,۰۰۰ تومان</span></li>
<li>اروپا – <span class="price">۷۵,۰۰۰ تومان</span></li>
<li>آسیا – <span class="price">۴۰,۰۰۰ تومان</span></li>
</ul>
<a class="btn">سفارش</a>
</div>
<div class="card">
<h4>سرویس‌های تلگرام</h4>
<ul>
<li>ریپورتر – <span class="price">۱۵۰,۰۰۰ تومان</span></li>
<li>بوست یک ماهه – <span class="price">۸۰,۰۰۰ تومان</span></li>
<li>گرام 10K – <span class="price">۱۲۰,۰۰۰ تومان</span></li>
<li>گرام 50K – <span class="price">۴۸۰,۰۰۰ تومان</span></li>
<li>گرام 100K – <span class="price">۹۰۰,۰۰۰ تومان</span></li>
<li>استارز 500 – <span class="price">۷۰,۰۰۰ تومان</span></li>
<li>استارز 1000 – <span class="price">۱۳۰,۰۰۰ تومان</span></li>
<li>احراز فرگمنت – <span class="price">۸۰۰,۰۰۰ تومان</span></li>
</ul>
<a class="btn">سفارش</a>
</div>
<div class="card">
<h4>سرویس‌های ویژه</h4>
<ul>
<li>ChatGPT – <span class="price">۲۲۰,۰۰۰ تومان</span></li>
<li>NFT – <span class="price">۳۰۰,۰۰۰ تومان</span></li>
<li>WireGuard – <span class="price">۱۲۰,۰۰۰ تومان</span></li>
<li>V2ray – <span class="price">۹۰,۰۰۰ تومان</span></li>
</ul>
<a class="btn">سفارش</a>
</div>
</div>
</section>
<section id="about" style="margin-top:40px;">
<h3 class="section-title">درباره MR STORE</h3>
<p style="color:#ccc;line-height:1.8;">
MR STORE فروشگاه تخصصی خدمات تلگرام، شماره مجازی و سرویس‌های دیجیتال است.
</p>
</section>
<section id="contact" style="margin-top:40px;">
<h3 class="section-title">تماس با MR STORE</h3>
<form style="max-width:500px;">
<input type="text" placeholder="نام" style="width:100%;padding:10px;margin-bottom:10px;background:#111;border:1px solid #333;color:#fff;">
<input type="text" placeholder="شماره تماس / آیدی تلگرام" style="width:100%;padding:10px;margin-bottom:10px;background:#111;border:1px solid #333;color:#fff;">
<textarea placeholder="توضیحات" rows="4" style="width:100%;padding:10px;background:#111;border:1px solid #333;color:#fff;"></textarea>
<button class="btn" style="margin-top:10px;">ارسال</button>
</form>
</section>
</div>
<footer>MR STORE © همه حقوق محفوظ است.</footer>
</body>
</html>
